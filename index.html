<!DOCTYPE html>
<html lang="en" style="background-color: #000000;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Anglow Homes | Premium Real Estate in Lagos & Ogun</title>
    <meta name="description" content="Discover exclusive luxury homes in Lekki, strategic land banking in Ibeju-Lekki, and secure gated estates in Mowe-Ofada. Experience the Anglow standard of excellence." />
    
    <meta property="og:title" content="Anglow Homes | Redefining Luxury Living" />
    <meta property="og:description" content="Curated luxury listings and strategic land investments across Lagos and Ogun State." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Anglow Homes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

    <style>
      /* Smooth scroll and dark theme initialization */
      html {
        scroll-behavior: smooth;
        background: #000000;
        /* Prevent layout shift during font loading */
        font-family: 'Inter', sans-serif;
      }
      body {
        margin: 0;
        background: #000000;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      
      /* Premium Selection Color: Matches the Gold Accent (#D4AF37) */
      ::selection {
        background: #D4AF37; 
        color: #000;
      }

      /* Custom Scrollbar for a sleek luxury look */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: #333333;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #D4AF37;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
